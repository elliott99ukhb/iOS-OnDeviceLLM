<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: deep indigo to violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4338CA"/>
      <stop offset="0.55" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
    <!-- Soft top-left sheen for depth -->
    <radialGradient id="sheen" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Sparkle fill: matches the brand gradient so it reads against white -->
    <linearGradient id="spark" x1="362" y1="320" x2="662" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
  </defs>

  <!-- Opaque background (App Store icons must have no transparency) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#sheen)"/>

  <!-- Chat bubble: rounded body + tail, drawn as one shape -->
  <g>
    <path d="M340 600 L300 742 L470 648 Z" fill="#FFFFFF"/>
    <rect x="232" y="250" width="560" height="410" rx="120" fill="#FFFFFF"/>
  </g>

  <!-- AI sparkle inside the bubble (4-point star with pinched sides) -->
  <path d="M512 322
           Q554 414 662 455
           Q554 496 512 588
           Q470 496 362 455
           Q470 414 512 322 Z"
        fill="url(#spark)"/>

  <!-- Small accent sparkle, top-right of the main one -->
  <path d="M690 330
           Q708 372 752 390
           Q708 408 690 450
           Q672 408 628 390
           Q672 372 690 330 Z"
        fill="url(#spark)" opacity="0.9"/>
</svg>
